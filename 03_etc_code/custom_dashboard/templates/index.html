<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNS 통합 포스팅 대시보드</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>SNS 통합 포스팅 대시보드</h1>
        <p>이곳에 글을 작성하면 Discord, X(Twitter), Naver Cafe에 동시에 포스팅됩니다.</p>
        
        <div class="auth-section">
            <a href="/naver_auth" class="auth-btn">네이버 API 토큰 발급하기 (1회 필수)</a>
            <p class="small-text">* 브라우저를 통해 네이버 로그인을 진행하고 Access Token을 자동으로 .env에 저장합니다.</p>
        </div>

        <textarea id="post-content" placeholder="여기에 포스팅할 내용을 입력하세요..."></textarea>
        <button id="submit-btn">전송</button>

        <div id="status-container">
            <h2>전송 결과</h2>
            <div id="results">
                결과가 여기에 표시됩니다.
            </div>
        </div>
    </div>

    <script>
        document.getElementById('submit-btn').addEventListener('click', async () => {
            const content = document.getElementById('post-content').value;
            const submitBtn = document.getElementById('submit-btn');
            const resultsDiv = document.getElementById('results');

            if (!content.trim()) {
                alert('포스팅할 내용을 입력해주세요.');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '전송 중...';
            resultsDiv.innerHTML = '';

            try {
                const response = await fetch('/post', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ content: content }),
                });

                const results = await response.json();

                for (const [platform, result] of Object.entries(results)) {
                    const p = document.createElement('p');
                    p.className = result.status; // 'success' or 'error'
                    p.textContent = `[${platform.toUpperCase()}] ${result.message}`;
                    resultsDiv.appendChild(p);
                }

            } catch (error) {
                resultsDiv.innerHTML = `<p class="error">서버와 통신 중 오류가 발생했습니다: ${error}</p>`;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '전송';
            }
        });
    </script>
</body>
</html>
